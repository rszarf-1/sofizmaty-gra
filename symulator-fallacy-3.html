<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symulator Sofizmatów - Gra Edukacyjna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-dark: #0f172a;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            flex: 1;
            padding: 40px 30px;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }

        .meters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .meter {
            background: var(--gray-50);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .meter.merit { border-left-color: #8b5cf6; }
        .meter.popularity { border-left-color: #ec4899; }
        .meter.inoculation { border-left-color: #f59e0b; }

        .meter-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 8px;
        }

        .meter-bar {
            background: var(--gray-200);
            height: 10px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .meter-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            transition: width 0.3s ease;
        }

        .meter.popularity .meter-fill {
            background: linear-gradient(90deg, #ec4899, #f59e0b);
        }

        .meter.inoculation .meter-fill {
            background: linear-gradient(90deg, #f59e0b, #10b981);
        }

        .meter-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .card p {
            margin-bottom: 12px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .narrator-card {
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-700) 100%);
            color: white;
            border: none;
            border-left: 4px solid var(--primary);
            margin-bottom: 25px;
        }

        .narrator-card p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
        }

        .narrator-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .narrator-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .narrator-name {
            font-weight: 600;
            font-size: 14px;
        }

        .badges {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.bronze { background: #fcd34d; color: #78350f; }
        .badge.silver { background: #e5e7eb; color: #374151; }
        .badge.gold { background: #fef3c7; color: #92400e; }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--text-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--gray-300);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .option {
            background: var(--gray-50);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .option-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .profile-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, #fce7f3 100%);
            border: 2px solid var(--primary);
            text-align: center;
            padding: 40px 30px;
            margin: 20px 0;
        }

        .profile-card h2 {
            font-size: 28px;
            margin: 20px 0;
            color: var(--primary-dark);
        }

        .profile-icon {
            font-size: 48px;
            margin: 20px 0;
        }

        .profile-card p {
            font-size: 15px;
            line-height: 1.8;
            margin: 15px 0;
            color: var(--text-primary);
        }

        .reflection-card {
            background: var(--gray-50);
            border-left: 4px solid var(--primary);
            padding: 25px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .reflection-card p {
            color: var(--text-primary);
            line-height: 1.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .fallacy-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .fallacy-item:last-child {
            border-bottom: none;
        }

        .fallacy-name {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .fallacy-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .progress {
            background: var(--gray-200);
            height: 4px;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.3s ease;
        }

        .context-box {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }

        .context-box strong {
            color: var(--primary-dark);
        }

        .feedback {
            background: var(--success);
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .feedback.error {
            background: var(--danger);
        }

        .feedback.warning {
            background: var(--warning);
            color: white;
        }

        .history-item {
            background: var(--gray-50);
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 13px;
            border-left: 3px solid var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat {
            background: var(--gray-50);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .category-intro {
            background: linear-gradient(135deg, var(--primary-light) 0%, #fce7f3 100%);
            border: 2px solid var(--primary);
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .category-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 15px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            color: var(--gray-500);
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .content {
                padding: 20px 15px;
            }

            .meters {
                grid-template-columns: 1fr;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Symulator Sofizmatów</h1>
            <p>Edukacyjna gra o logicznych błędach w polityce społecznej</p>
        </div>

        <div class="content" id="app-content">
            <div class="card">
                <h2>Ładowanie gry...</h2>
                <p>Trwa przygotowanie scenariuszy. Proszę czekać.</p>
            </div>
        </div>
    </div>

    <div id="help-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Słownik Sofizmatów</h2>
            <div id="fallacies-list"></div>
        </div>
    </div>

    <script>
        // Embed scenarios data directly
        const SCENARIOS_DATA = {"meta": {"version": "2.0", "title": "Sofizmaty w polityce społecznej", "totalScenarios": 20, "categoriesCount": 5, "scenariosPerCategory": 4}, "categories": [{"id": "emotions", "name": "Manipulacja emocjami", "description": "Wykorzystywanie uczuć zamiast dowodów w argumentach dotyczących polityki społecznej. Emocje mogą uzupełniać argumentację, ale nie powinny jej zastępować.", "badgeName": "Odkrywca emocji", "color": "#ef4444", "fallacies": ["Argumentum ad misericordiam (odwołanie do litości)", "Argumentum ad metum (odwołanie do strachu)", "Argumentum ad populum (odwołanie do większości)"], "scenarios": [{"id": "emo_det_1", "mode": "detective", "domain": "migracyjna", "topic": "Program integracji uchodźców", "context": "Debata w komisji sejmowej dotycząca finansowania programu integracji uchodźców. Poseł partii opozycyjnej zabiera głos w dyskusji o budżecie programu.", "argument": "Wyobraźcie sobie te biedne dzieci, które uciekły przed wojną, nie znają języka, siedzą same w obcym kraju. Jak możecie patrzeć im w oczy i mówić, że nie dajecie pieniędzy na ten program? Kto z was jest w stanie powiedzieć płaczącemu dziecku: nie pomożemy ci?", "fallacy": "Argumentum ad misericordiam (odwołanie do litości)", "fallacyExplanation": "Argument odwołuje się wyłącznie do emocji (litości wobec dzieci), pomijając kluczowe pytania merytoryczne: jaka jest skuteczność programu, ile kosztuje, jakie ma wymierne rezultaty, czy istnieją lepsze alternatywy. Emocjonalny obraz płaczącego dziecka zastępuje analizę efektywności wydatków publicznych.", "contextSensitivity": {"level": "medium", "validWhen": "Odwołanie do cierpienia uchodźców jest uzasadnione jako uzupełnienie merytorycznych argumentów — np. gdy towarzyszy mu analiza skuteczności programu, dane o potrzebach czy porównanie z innymi rozwiązaniami.", "invalidBecause": "W tym przypadku emocje całkowicie zastępują analizę — mówca nie podaje żadnych danych o skuteczności programu, jego kosztach czy rezultatach, a zamiast tego wywiera presję emocjonalną na oponentów."}, "responses": {"substantive": {"text": "Takie podejście unika konkretnych pytań: czy program faktycznie pomaga uchodźcom się integrować? Jakie mamy mierniki sukcesu? Czy fundusze idą na rzeczy, które rzeczywiście przynoszą rezultaty? Litość jest ważna, ale nie powinna być podstawą decyzji budżetowych.", "merit": 16, "popularity": 4, "explanation": "Odpowiedź merytoryczna: nie ignoruje emocji ani problemu, ale przenosi dyskusję na grunt danych. Szanuje intencje mówcy, jednocześnie wskazując na potrzebę evidence-based policy.", "reactions": ["Nudne dane zamiast ludzkiego podejścia...", "W sumie ma rację, potrzebujemy faktów.", "Typowy technokrata, zero empatii."], "inoculation": 10}, "eristic": {"text": "To manipulacja emocjami! Polityk atakuje uczucia, zamiast mówić o rzeczywistych efektach programu. Czy program rzeczywiście funkcjonuje? Ile kosztuje? Jakie są wyniki? To pytania, które zostały całkowicie zignorowane.", "merit": 4, "popularity": 16, "explanation": "Odpowiedź erystyczna: atakuje wiarygodność mówcy (tu quoque / ad personam) zamiast odnosić się do meritum. Może być skuteczna retorycznie, ale nie wnosi niczego do dyskusji o programie.", "reactions": ["Ooo, mocne! Trzeba było tak od razu!", "Hipokryzja obnażona!", "To nie jest odpowiedź na pytanie o budżet..."], "inoculation": 10}, "fallacious": {"text": "Oczywiście chcemy pomagać dzieciom, ale suchość liczb nie oznacza braku serca. Możemy być współczujący i jednocześnie pytać: czy te pieniądze trafiają tam, gdzie powinny? Czy program naprawdę się sprawdza?", "merit": 2, "popularity": 21, "explanation": "Odpowiedź zawiera argument ad populum (odwołanie do większości) połączony z atakiem ad personam (kto jest przeciw, nie ma serca). Zamiast argumentów merytorycznych, wywiera presję społeczną i moralną.", "reactions": ["Dokładnie! Kto jest przeciw, powinien się wstydzić!", "Ale to nie o empatię chodzi, tylko o budżet...", "75% popiera? Skąd te dane?"], "inoculation": 7}}}, {"id": "emo_det_2", "mode": "detective", "domain": "zdrowotna", "topic": "Finansowanie in vitro z budżetu", "context": "Dyskusja w mediach społecznościowych pod artykułem o propozycji rozszerzenia programu refundacji procedury in vitro. Komentator pisze wpis, który zdobywa dużo reakcji.", "argument": "Czy chcecie, żeby Polska wymarła?! Jeśli nie będziemy finansować in vitro, za 30 lat nie będzie komu płacić naszych emerytur, szpitale będą puste, a polskie miasta zamienią się w wyludnione pustynie. Każdy kto jest przeciw, skazuje Polskę na zagładę demograficzną!", "fallacy": "Argumentum ad metum (odwołanie do strachu)", "fallacyExplanation": "Argument wykorzystuje strach przed katastrofą demograficzną, prezentując skrajnie przesadzony scenariusz (wyludnione pustynie) bez dowodów. Uwaga: ten argument zawiera kilka sofizmatów jednocześnie — łączy odwołanie do strachu (dominujący sofizmat) z fałszywą alternatywą (albo finansujemy in vitro, albo zagłada) i argumentem równi pochyłej (brak refundacji → wymarcie). Jeśli wybrałeś argument równi pochyłej lub fałszywą alternatywę — to też trafna obserwacja, ale dominującą techniką jest strach. Pomija fakt, że polityka demograficzna obejmuje wiele narzędzi.", "contextSensitivity": {"level": "low", "validWhen": "Argumenty demograficzne mogą być uzasadnione, gdy opierają się na konkretnych projekcjach GUS, porównaniach międzynarodowych i analizie wpływu konkretnych programów na dzietność.", "invalidBecause": "Ten argument jest jawną manipulacją emocjonalną — używa apokaliptycznych wizji (pustynie, zagłada) bez jakichkolwiek danych, a każdy sprzeciw etykietuje jako skazanie narodu na wymarcie."}, "responses": {"substantive": {"text": "Taki argument opiera się na strachu przed katastrofą demograficzną, ale pomija istotne pytania: jakie są faktyczne projekcje GUS dotyczące demografii? Jakie inne narzędzia polityki prorodzinnej istnieją? Jaka jest rzeczywista skuteczność in vitro w kontekście demografii? Strach nie powinien zastępować analizy danych.", "merit": 15, "popularity": 5, "explanation": "Odpowiedź merytoryczna: nie bagatelizuje problemu demograficznego, ale przenosi dyskusję z apokaliptycznych wizji na grunt danych i porównań. Wskazuje na złożoność tematu.", "reactions": ["Ale nuuuda, a ludzie wymierają!", "Rzetelne podejście, szacunek.", "Za dużo analiz, za mało działania."], "inoculation": 10}, "eristic": {"text": "Wyludnione pustynie? Serio? Może jeszcze meteoryty spadną na Polskę, jeśli nie przegłosujemy refundacji? Taki straszak to czysta manipulacja — zero danych, za to dużo paniki. Pokażcie konkretne projekcje demograficzne zamiast apokaliptycznych wizji!", "merit": 5, "popularity": 15, "explanation": "Odpowiedź erystyczna: trafnie wyśmiewa przesadę argumentu (pustynie, zagłada), ale redukcja ad absurdum nie zastępuje merytorycznej analizy. Skuteczna retorycznie, ale nie wnosi treści o samym programie in vitro.", "reactions": ["Haha, meteoryty! Dobre!", "Śmiech zamiast argumentów...", "Ale trafne, ten post to totalna histeria."], "inoculation": 10}, "fallacious": {"text": "Znam dwie pary, które przeszły in vitro — u jednej nie zadziałało, u drugiej dziecko ma problemy zdrowotne. Zamiast wydawać miliony na niepewną procedurę, lepiej wspierać rodziny naturalnie: dłuższe urlopy, tańsze mieszkania, żłobki.", "merit": 3, "popularity": 20, "explanation": "Odpowiedź opiera się na dowodzie anegdotycznym — dwa przypadki nie mogą być podstawą oceny procedury medycznej o udokumentowanej skuteczności (~30-40% na cykl). Fałszywa alternatywa: in vitro i wsparcie rodzin to nie wykluczające się opcje.", "reactions": ["U mojej znajomej też nie zadziałało!", "A statystyki mówią co innego...", "Naturalne metody najlepsze!"], "inoculation": 7}}}, {"id": "emo_spin_1", "mode": "spin-doctor", "domain": "edukacyjna", "topic": "Likwidacja małych szkół wiejskich", "briefing": "Jesteś doradcą medialnym wójta gminy, który chce zlikwidować trzy małe szkoły wiejskie i dowozić dzieci do szkoły gminnej w celu oszczędności budżetowych. Twój szef potrzebuje argumentu na zebranie z rodzicami. Wykorzystaj techniki manipulacji emocjonalnej.", "targetFallacyCategory": "emotions", "options": [{"id": "fear", "technique": "Argumentum ad metum (odwołanie do strachu)", "text": "Jeśli nie zamkniemy tych szkół, gmina zbankrutuje w ciągu dwóch lat. Nie będzie pieniędzy na remonty dróg, na oświetlenie ulic, na odśnieżanie. Wasze dzieci będą chodziły do szkoły w budynku, który się dosłownie rozsypie, bo nie będzie pieniędzy na remonty!", "meritDamage": 2, "popularityGain": 16, "inoculationGain": 12, "expertDebunking": "Ten argument wykorzystuje strach przed bankructwem gminy i niebezpiecznym budynkiem szkoły, prezentując skrajny scenariusz bez konkretnych danych finansowych. Nie podaje rzeczywistego deficytu, nie porównuje kosztów utrzymania szkół z kosztami dowozu, nie uwzględnia dotacji oświatowej z budżetu państwa.", "reactions": ["Ale straszenie! A ile konkretnie brakuje w budżecie?", "Lepiej zamknąć szkołę niż czekać, aż się zawali!", "Typowa manipulacja, żeby przeforsować swoją decyzję."]}, {"id": "pity", "technique": "Argumentum ad misericordiam (odwołanie do litości)", "text": "Pomyślcie o nauczycielach w szkole gminnej, którzy pracują w przepełnionych klasach z 35 uczniami. Oni ledwo dają radę, a my utrzymujemy szkoły z 12 uczniami. To niesprawiedliwe wobec tych ciężko pracujących nauczycieli i ich uczniów!", "meritDamage": 5, "popularityGain": 14, "inoculationGain": 11, "expertDebunking": "Argument odwołuje się do litości wobec nauczycieli w dużej szkole, tworząc fałszywą opozycję: albo małe szkoły, albo komfort nauczycieli w dużej. W rzeczywistości problem przepełnionych klas wymaga osobnego rozwiązania (np. dodatkowego etatu), a nie likwidacji innych placówek.", "reactions": ["A o naszych dzieciach ze wsi kto pomyśli?", "Prawda, nauczyciele mają ciężko.", "To nie jest albo-albo, można rozwiązać oba problemy."]}, {"id": "weak", "technique": "Argument pozornie racjonalny", "text": "Likwidacja tych szkół jest konieczna ze względów budżetowych. Szkoły elitarne konsumują duże zasoby, które mogą być lepiej podzielone. Edukacja powinna być bardziej egalitarna niż skoncentrowana na wyborze. To pragmatyczne podejście do ograniczeń budżetowych.", "meritDamage": 12, "popularityGain": 10, "inoculationGain": 8, "expertDebunking": "Argument wydaje się racjonalny — o budżecie i równości — ale jest słaby, ponieważ nie bierze pod uwagę korzyści płynących z wyspecjalizowanej edukacji, nie porównuje rzeczywistych kosztów i nie pokazuje, że budżet szkolny jest właściwym miejscem cięć. Pozorna racjonalność maskuje uproszczony obraz problemu.", "reactions": ["I to tyle wyjaśnień?", "Bo tak zdecydowaliście? A nas nikt nie pytał!", "Zero argumentów, zero szacunku."]}]}, {"id": "emo_ctx_1", "mode": "context-judge", "domain": "ubezpieczen_spolecznych", "topic": "Reforma systemu rent", "context": "Debata w Senacie nad zmianami w systemie orzekania o niepełnosprawności. Senator zabiera głos w dyskusji o zaostrzeniu kryteriów przyznawania rent.", "argument": "Nie możemy ignorować cierpienia osób z niepełnosprawnościami, które po wieloletniej pracy tracą zdrowie i zdolność do zarobkowania. Dane ZUS pokazują, że 40% nowych rencistów to osoby po 50. roku życia z chorobami układu ruchu. Ta reforma musi uwzględniać ich realną sytuację zdrowotną i ekonomiczną.", "isActuallySophism": false, "fallacyIfSophism": null, "explanation": "To NIE jest sofizmat. Odwołanie do cierpienia jest tu uzasadnione, ponieważ: (1) jest bezpośrednio powiązane z omawianym tematem (reforma rent dotyczy właśnie osób cierpiących), (2) jest poparte konkretnymi danymi (40% nowych rencistów po 50. roku życia), (3) nie zastępuje argumentacji, lecz ją uzupełnia — mówca formułuje konkretny postulat (uwzględnienie sytuacji zdrowotnej i ekonomicznej).", "ifCalledSophism": "Uwaga! Nie każde odwołanie do emocji jest sofizmatem. W tym przypadku emocje są proporcjonalne do tematu (reforma rent dotyczy ludzi cierpiących), poparte danymi ZUS i towarzyszą konkretnemu postulatowi. To uzasadnione połączenie empatii z argumentacją merytoryczną.", "ifCalledLegitimate": "Dobrze rozpoznajesz różnicę! Kluczowe czynniki: (1) emocje dotyczą bezpośrednio omawianego problemu, (2) argumentowi towarzyszą konkretne dane, (3) mówca formułuje merytoryczny postulat, nie tylko apeluje do uczuć.", "contextFactors": ["Emocje bezpośrednio związane z tematem debaty (renty dotyczą osób cierpiących)", "Argument poparty konkretnymi danymi statystycznymi (40% rencistów, ZUS)", "Mówca formułuje merytoryczny postulat, a emocje go uzupełniają, nie zastępują"], "inoculationGain": 10, "kpiCorrect": {"merit": 12, "popularity": 8, "inoculation": 10}, "kpiIncorrect": {"merit": 4, "popularity": 12, "inoculation": 4}}]}, {"id": "attacks", "name": "Ataki na osobę i autorytet", "description": "Podważanie osoby przedstawiającej argument zamiast odnoszenia się do jego treści. Krytyka nadawcy może być zasadna, ale nie powinna zastępować merytorycznej polemiki.", "badgeName": "Tropiciel ad personam", "color": "#f97316", "fallacies": ["Argumentum ad personam (atak personalny)", "Tu quoque (ty także)", "Argumentum ad verecundiam (nieuprawnione odwołanie do autorytetu)"], "scenarios": [{"id": "att_det_1", "mode": "detective", "domain": "mieszkaniowa", "topic": "Program Mieszkanie Plus", "context": "Dyskusja na Twitterze/X o rządowym programie budowy tanich mieszkań. Ekspert ds. nieruchomości publikuje krytyczną analizę programu. W odpowiedzi pojawia się popularny komentarz.", "argument": "Ten tzw. 'ekspert' sam ma trzy mieszkania na wynajem i zarabia na drożyźnie. Jasne, że krytykuje program tanich mieszkań — bo konkurencja mu się nie podoba! Nie słuchajcie go, on broni własnego portfela, a nie waszych interesów.", "fallacy": "Argumentum ad personam (atak personalny)", "fallacyExplanation": "Komentarz atakuje osobę eksperta (jego sytuację majątkową i domniemane motywacje) zamiast odnosić się do treści jego analizy. Nawet jeśli ekspert ma mieszkania na wynajem, jego argumenty merytoryczne mogą być trafne lub nie — to należy oceniać niezależnie od osoby autora.", "contextSensitivity": {"level": "medium", "validWhen": "Ujawnienie konfliktu interesów eksperta jest uzasadnione jako dodatkowa informacja dla odbiorców — ale powinno towarzyszyć merytorycznej ocenie argumentów, a nie ją zastępować.", "invalidBecause": "W tym przypadku cała odpowiedź skupia się na osobie eksperta i jego domniemanych motywacjach. Ani jedno zdanie nie odnosi się do treści analizy. Wezwanie 'nie słuchajcie go' wprost zachęca do ignorowania argumentów na podstawie osoby, nie treści."}, "responses": {"substantive": {"text": "Konflikt interesów eksperta warto odnotować, ale to nie zwalnia z analizy jego argumentów. Co konkretnie mówi ta analiza programu Mieszkanie Plus? Jakie dane przytacza? Nawet jeśli autor ma mieszkania na wynajem, jego zarzuty merytoryczne mogą być trafne lub nie — to trzeba ocenić niezależnie od osoby.", "merit": 16, "popularity": 4, "explanation": "Odpowiedź uznaje potencjalny konflikt interesów, ale słusznie kieruje dyskusję z powrotem na meritum analizy. Zachęca do krytycznej oceny argumentów, niezależnie od osoby autora.", "reactions": ["Fakty nie mają właściciela — ważne co mówi, nie kto.", "Ale łatwo mówić, jak się nie wynajmuje...", "Nudne, wolę wiedzieć kto za tym stoi!"], "inoculation": 10}, "eristic": {"text": "Zamiast odnieść się do danych z analizy, autor atakuje eksperta personalnie. Ile mieszkań ma ekspert, nie zmienia faktów o programie Mieszkanie Plus. Może zamiast tropić czyjeś nieruchomości, przeczytaj samą analizę?", "merit": 5, "popularity": 15, "explanation": "Odpowiedź trafnie wskazuje na ad personam, ale sama stosuje lekceważący ton wobec komentującego. Retoryczne judo — odwraca atak, ale nie wnosi argumentów merytorycznych za czy przeciw programowi.", "reactions": ["Ooo, zwrotka! Niezła!", "Obaj atakujecie osoby zamiast argumentów...", "BURN! To było dobre!"], "inoculation": 10}, "fallacious": {"text": "Nie słuchajmy anonimowych komentatorów w internecie — profesor nieruchomości z SGH opublikował znacznie rzetelniejszą analizę. Ekspert to bloger z mieszkaniami, a nie naukowiec. Prawdziwi specjaliści popierają program.", "merit": 3, "popularity": 20, "explanation": "Odpowiedź zawiera odwołanie do fałszywego autorytetu (profesor z SGH bez cytowania konkretnych tez) oraz atak ad personam (deprecjonowanie eksperta jako 'blogera'). Nie odnosi się do meritum żadnej z analiz.", "reactions": ["Profesor kontra bloger? Wiadomo kto wygrywa!", "A co konkretnie powiedział ten profesor?", "Argument z autorytetu to też błąd logiczny..."], "inoculation": 7}}}, {"id": "att_det_2", "mode": "detective", "domain": "edukacyjna", "topic": "Edukacja seksualna w szkołach", "context": "Rada rodziców dyskutuje o wprowadzeniu zajęć z edukacji seksualnej zgodnych z wytycznymi WHO. Jeden z rodziców zabiera głos.", "argument": "A co wy, zwolennicy tych zajęć, robiliście, gdy wasze dzieci miały problemy w szkole? Pamiętam, że pani Kowalska nie przychodziła na wywiadówki, a pan Nowak sam przyznał, że nie kontroluje, ile czasu syn spędza w internecie. I teraz nagle jesteście ekspertami od wychowania?", "fallacy": "Tu quoque (ty także)", "fallacyExplanation": "Argument odwraca uwagę od tematu (edukacja seksualna) na domniemane wady rodziców, którzy popierają te zajęcia. Błędy wychowawcze rodziców nie mają związku z merytoryczną oceną programu edukacji seksualnej — nawet niedoskonały rodzic może mieć rację w kwestii potrzeby edukacji seksualnej.", "contextSensitivity": {"level": "low", "validWhen": "Pytanie o wiarygodność i konsekwencję rodziców mogłoby być uzasadnione, gdyby dotyczyło ich kompetencji do prowadzenia tych zajęć — ale tutaj chodzi o poparcie programu prowadzonego przez profesjonalistów.", "invalidBecause": "Argument w pełni ignoruje meritum (jakość programu, dowody naukowe, wytyczne WHO) i skupia się wyłącznie na rzekomych wadach oponentów. To klasyczne tu quoque — zamiast odpowiadać na argument, atakujesz konsekwencję osoby go przedstawiającej."}, "responses": {"substantive": {"text": "Wychowawcze niedociągnięcia rodziców nie mają związku z oceną programu edukacji seksualnej. Pytania merytoryczne to: czy program jest zgodny z wytycznymi WHO? Jakie są dowody na skuteczność takiej edukacji? Jakie efekty przyniosła w innych krajach? Zamiast personalnych wycieczek, rozmawiajmy o programie.", "merit": 15, "popularity": 5, "explanation": "Odpowiedź nie atakuje mówcy, dyplomatycznie przekierowuje dyskusję na meritum programu edukacji seksualnej. Zachęca do oceny konkretnych treści zamiast kompetencji poszczególnych rodziców.", "reactions": ["Mądre słowa, ale nudne jak flaki z olejem.", "Wreszcie ktoś mówi o programie, a nie o sobie nawzajem!", "Łatwo być dyplomatą, gdy cię nie atakują."], "inoculation": 10}, "eristic": {"text": "Chwila — to jest rada rodziców czy grupa do wzajemnego obgadywania? Pani Kowalska nie była na wywiadówce, więc edukacja seksualna jest zła? Jaki to ma związek? Może wróćmy do tematu zamiast prać brudne rodzinne sprawy?", "merit": 6, "popularity": 14, "explanation": "Ironia i sarkazm — odpowiedź celnie punktuje absurdalność personalizacji dyskusji, ale sama nie wnosi żadnych argumentów merytorycznych za czy przeciw programowi edukacji seksualnej.", "reactions": ["Haha, grupa do obgadywania! Dobre!", "Też kpina zamiast argumentów...", "Przynajmniej zabawne, w przeciwieństwie do tego zebrania."], "inoculation": 10}, "fallacious": {"text": "Wszyscy wiemy, że większość rodziców nie rozmawia z dziećmi o seksie — badania pokazują, że 80% nastolatków uczy się z internetu. Skoro rodzice nie dają rady, szkoła musi to robić za nich. To oczywiste.", "merit": 3, "popularity": 19, "explanation": "Odpowiedź zawiera ad populum ('wszyscy wiemy') i powołuje się na niesprecyzowane 'badania' bez źródła. Statystyka '80%' wydaje się zmyślona. Choć teza może być słuszna, sposób jej uzasadnienia jest manipulacyjny.", "reactions": ["80%? Skąd ta liczba?", "W sumie chyba mało kto rozmawia o tym z dziećmi...", "Jakie konkretnie badania to potwierdzają?"], "inoculation": 8}}}, {"id": "att_spin_1", "mode": "spin-doctor", "domain": "migracyjna", "topic": "Zasiłki dla cudzoziemców", "briefing": "Jesteś specjalistą od mediów społecznościowych polityka, który sprzeciwia się przyznawaniu zasiłków socjalnych cudzoziemcom z pozwoleniem na pobyt. Musisz napisać post na media społecznościowe, który zdyskredytuje badaczkę, która opublikowała raport wykazujący pozytywne skutki ekonomiczne integracji migrantów. Wykorzystaj techniki ataku na osobę i źródło.", "targetFallacyCategory": "attacks", "options": [{"id": "ad_hominem", "technique": "Argumentum ad personam (atak personalny)", "text": "Dr Wiśniewska dostaje granty z UE na badania nad migracją — oczywiście, że jej wyniki są pozytywne! Kto płaci, ten wymaga. Zamiast słuchać naukowców na pasku Brukseli, popatrzmy na realia w naszych osiedlach!", "meritDamage": 2, "popularityGain": 17, "inoculationGain": 11, "expertDebunking": "Klasyczny atak ad personam podważający motywacje badaczki zamiast treści raportu. Granty UE przechodzą procedury peer review i audytu. Źródło finansowania badań jest jawne, ale nie determinuje automatycznie ich wyników — to dlatego istnieje system recenzji naukowych.", "reactions": ["Granty z UE = propaganda! Jasne!", "A co z peer review? Ktoś sprawdzał te badania...", "Wreszcie ktoś mówi prawdę o tych naukowych lobbystach!"]}, {"id": "tu_quoque", "technique": "Tu quoque (ty także)", "text": "Ciekawe, że dr Wiśniewska mówi o korzyściach z migracji, ale sama mieszka w zamkniętym osiedlu bez żadnych cudzoziemców w sąsiedztwie. Łatwo być tolerancyjnym, gdy to nie ty musisz dzielić klatkę schodową z obcymi!", "meritDamage": 5, "popularityGain": 14, "inoculationGain": 11, "expertDebunking": "Tu quoque — atak na rzekomą hipokryzję badaczki. Nawet gdyby fakty o jej miejscu zamieszkania były prawdziwe, nie mają żadnego wpływu na jakość jej badań naukowych. Naukowiec nie musi osobiście doświadczać zjawiska, żeby je rzetelnie badać.", "reactions": ["Hipokrytka! Sama nie chce migrantów pod nosem!", "Gdzie mieszka nie ma nic do rzeczy z jakością badań...", "To właśnie ten pijący liberalizm!"]}, {"id": "weak", "technique": "Uogólnienie anegdotyczne", "text": "Znałem pracownika, który dostał zasiłek dla cudzoziemca i nigdy nie szukał pracy. Zasiłki przyciągają ludzi, którzy nie chcą pracować. To dowód, że system jest wykorzystywany. Powinniśmy wyeliminować takie programy.", "meritDamage": 12, "popularityGain": 10, "inoculationGain": 8, "expertDebunking": "Jedna historia nie jest dowodem. Anegdota może być szokująca, ale statystyki mogą pokazywać inny obraz — na przykład większość odbiorców faktycznie pracuje lub szuka pracy. Uogólnienie od jednego przypadku do całego systemu jest logicznym błędem, nawet jeśli historia jest rzeczywista.", "reactions": ["OK, ale dlaczego?", "Argumenty jakieś?", "Tak sobie, nic tu nie ma."]}]}, {"id": "att_ctx_1", "mode": "context-judge", "domain": "zdrowotna", "topic": "Refundacja nowych leków onkologicznych", "context": "Debata o włączeniu nowego leku onkologicznego na listę leków refundowanych. W dyskusji pada następujący argument.", "argument": "Profesor Kowalski, kierujący Kliniką Onkologii Dziecięcej i współautor trzech badań klinicznych nad tym lekiem, twierdzi, że refundacja jest uzasadniona na podstawie danych z wieloośrodkowego badania obejmującego 3000 pacjentów.", "isActuallySophism": false, "fallacyIfSophism": null, "explanation": "To NIE jest sofizmat. Odwołanie do autorytetu (argumentum ad verecundiam) jest tu uzasadnione, ponieważ: (1) profesor Kowalski jest ekspertem dokładnie w dziedzinie, o której mowa (onkologia), (2) jego stanowisko jest oparte na konkretnych danych empirycznych (badanie na 3000 pacjentach), (3) badanie jest wieloośrodkowe, co zwiększa jego wiarygodność.", "ifCalledSophism": "Uwaga! Nie każde odwołanie do autorytetu (argumentum ad verecundiam) jest sofizmatem. Jeśli dostrzegasz potencjalny konflikt interesów (profesor jest współautorem badań) — to wartościowa obserwacja krytycznego myślenia. Jednak współautorstwo badań wieloośrodkowych świadczy o ekspertyzie, a wyniki podlegają niezależnej recenzji naukowej (peer review). Profesor Kowalski jest ekspertem w dziedzinie onkologii — dokładnie tej, której dotyczy debata — i powołuje się na konkretne, weryfikowalne dane z badań klinicznych. To przykład POPRAWNEGO odwołania do autorytetu.", "ifCalledLegitimate": "Dobrze! Rozpoznajesz różnicę między uzasadnionym a fałszywym odwołaniem do autorytetu. Kluczowe: ekspertyza w relevantnej dziedzinie + konkretne dane empiryczne + weryfikowalne badanie wieloośrodkowe.", "contextFactors": ["Ekspert jest specjalistą w dokładnie tej dziedzinie (onkologia), której dotyczy argument", "Stanowisko oparte na wieloośrodkowym badaniu klinicznym (3000 pacjentów)", "Dane są weryfikowalne i pochodzą z recenzowanego badania naukowego"], "inoculationGain": 10, "kpiCorrect": {"merit": 12, "popularity": 8, "inoculation": 10}, "kpiIncorrect": {"merit": 4, "popularity": 12, "inoculation": 4}}]}, {"id": "distortion", "name": "Zniekształcanie argumentów", "description": "Przekręcanie, upraszczanie lub karykaturalne przedstawianie stanowiska oponenta, zamiast uczciwego odniesienia się do jego rzeczywistych argumentów.", "badgeName": "Demaskator słomianej kukły", "color": "#8b5cf6", "fallacies": ["Słomiana kukła (straw man)", "Fałszywa alternatywa (fałszywy dylemat)", "Selektywne dobieranie dowodów (cherry picking)"], "scenarios": [{"id": "dist_det_1", "mode": "detective", "domain": "ubezpieczen_spolecznych", "topic": "Podwyższenie wieku emerytalnego", "context": "Dyskusja w programie publicystycznym o propozycji stopniowego podwyższenia wieku emerytalnego. Jeden z panelistów odpowiada na postulat ekonomisty.", "argument": "Ekonomista chce, żebyśmy pracowali do śmierci! Według niego emerytura to luksus, na który Polska nie może sobie pozwolić. Najchętniej zamknąłby ZUS i kazał staruszkom pracować w kopalniach do 80. roku życia!", "fallacy": "Słomiana kukła (straw man)", "fallacyExplanation": "Panelista karykaturalnie zniekształca stanowisko ekonomisty: z propozycji 'stopniowego podwyższenia' robi 'pracę do śmierci' i 'zamknięcie ZUS'. Nikt nie postulował pracy w kopalniach do 80 lat — to celowa przesada, która tworzy łatwiejszy cel do ataku.", "contextSensitivity": {"level": "low", "validWhen": "Krytyka propozycji podwyższenia wieku emerytalnego jest uzasadniona, gdy odnosi się do faktycznych problemów: zdrowia osób starszych, nierówności warunków pracy, rzeczywistych skutków demograficznych.", "invalidBecause": "Panelista w ogóle nie odnosi się do rzeczywistej propozycji. Zamiast tego tworzy karykaturę ('praca do śmierci', 'kopalnie do 80 lat'), którą łatwiej zaatakować. To klasyczna słomiana kukła."}, "responses": {"substantive": {"text": "Panelista zniekształca propozycję ekonomisty: 'stopniowe podwyższenie' to nie 'praca do śmierci'. Warto wrócić do faktycznej treści: o ile miałby wzrosnąć wiek emerytalny? Jakie są dane o zdrowiu osób 65+? Jakie rozwiązania stosują inne kraje? Dyskutujmy o rzeczywistej propozycji, nie o karykaturze.", "merit": 16, "popularity": 4, "explanation": "Odpowiedź precyzyjnie koryguje zniekształcenie (słomianą kukłę), przywracając rzeczywistą treść propozycji ekonomisty. Zachęca do merytorycznej dyskusji nad faktycznym postulatem.", "reactions": ["Ale to nie zmienia faktu, że ludzie nie chcą pracować dłużej!", "Wreszcie ktoś sprostował te bzdury.", "Nudy, wolę emocje od faktów."], "inoculation": 10}, "eristic": {"text": "Kopalnie do 80 lat? Zamknięcie ZUS? Kto to powiedział? Chyba nie ekonomista — bo on mówił o stopniowym podwyższeniu o 2 lata. Może zanim zaatakujemy czyjąś propozycję, najpierw ją przeczytajmy?", "merit": 5, "popularity": 16, "explanation": "Ironia celnie punktuje zniekształcenie, ale sama nie wnosi argumentów merytorycznych. Wyśmiewa oponenta zamiast przedstawić konstruktywną odpowiedź na pytanie o wiek emerytalny.", "reactions": ["Haha, lekcje u twórców memów!", "Śmieszne, ale nie pomaga w dyskusji.", "Złapał go na gorącym uczynku!"], "inoculation": 9}, "fallacious": {"text": "Albo zostawiamy wiek emerytalny bez zmian i bronimy praw pracowników, albo ulegamy lobby pracodawców, którzy chcą nas wyzyskiwać do ostatniego dnia życia. Kto jest za podwyżką wieku emerytalnego, jest wrogiem ludzi pracy.", "merit": 2, "popularity": 21, "explanation": "Odpowiedź zawiera fałszywą alternatywę (albo status quo, albo wyzysk) i atak ad personam (wróg pracowników). Ignoruje całe spektrum możliwych rozwiązań pomiędzy tymi skrajnościami.", "reactions": ["Właśnie! Kto jest za podwyżką wieku, jest wrogiem ludzi pracy!", "Ale to chyba nie jest takie czarno-białe...", "Emocje zamiast argumentów, jak zwykle."], "inoculation": 7}}}, {"id": "dist_det_2", "mode": "detective", "domain": "migracyjna", "topic": "Polityka wizowa", "context": "Debata parlamentarna o ułatwieniach wizowych dla pracowników z wybranych krajów azjatyckich. Poseł opozycji komentuje propozycję rządu.", "argument": "Rząd stawia nas przed prostym wyborem: albo otwieramy granice dla wszystkich, albo nasza gospodarka się załamie. Nie ma żadnej trzeciej drogi. To jest szantaż — albo zgodzicie się na niekontrolowaną imigrację, albo weźmiecie odpowiedzialność za recesję!", "fallacy": "Fałszywa alternatywa", "fallacyExplanation": "Poseł przedstawia wybór między dwoma skrajnościami: 'otwarcie granic dla wszystkich' vs. 'załamanie gospodarcze', ignorując szereg rozwiązań pośrednich: selektywna polityka wizowa, programy dla konkretnych sektorów, dwustronne umowy, limity ilościowe. Propozycja rządu dotyczyła ułatwień dla wybranych krajów i zawodów, nie 'otwarcia granic dla wszystkich'.", "contextSensitivity": {"level": "low", "validWhen": "Krytyka polityki wizowej jest uzasadniona, gdy wskazuje na konkretne ryzyka (np. brak mechanizmów kontroli, niewydolność urzędów, skutki dla rynku pracy) i proponuje alternatywy.", "invalidBecause": "Poseł sztucznie redukuje złożoną kwestię do wyboru binarnego, zniekształcając propozycję rządu (ułatwienia wizowe ≠ otwarcie granic dla wszystkich) i grożąc recesją jako jedyną alternatywą."}, "responses": {"substantive": {"text": "Poseł przedstawia fałszywą alternatywę: 'otwarcie granic dla wszystkich' vs. 'recesja'. Propozycja rządu dotyczy ułatwień wizowych dla wybranych zawodów z wybranych krajów — to nie 'niekontrolowana imigracja'. Między skrajnościami istnieją selektywna polityka wizowa, limity ilościowe i dwustronne umowy.", "merit": 15, "popularity": 5, "explanation": "Odpowiedź precyzyjnie koryguje fałszywą alternatywę, przywraca rzeczywistą treść propozycji rządu i wskazuje na istnienie wielu rozwiązań pośrednich.", "reactions": ["Nudny technokrata, ale ma rację.", "Szczegóły, szczegóły... ludzie chcą jasnych odpowiedzi!", "Wreszcie ktoś mówi o faktycznej propozycji."], "inoculation": 10}, "eristic": {"text": "Otwarcie granic dla wszystkich? Rząd mówi o wizach dla spawaczy i programistów! Następnym razem może poseł przeczyta propozycję, zanim zacznie krzyczeć o recesji? To jak mówić, że kupno roweru to pierwszy krok do wyścigu Formuły 1.", "merit": 5, "popularity": 15, "explanation": "Sprytne odwrócenie — wskazuje na absurdalność skrajnej interpretacji posła. Ale samo nie wnosi merytorycznych argumentów za czy przeciw ułatwieniom wizowym. Retoryczne judo zamiast merytorycznej dyskusji.", "reactions": ["Odwrócił to pięknie!", "Ale sam też nie powiedział co jest w tej propozycji...", "Polityczne judo — niezłe!"], "inoculation": 10}, "fallacious": {"text": "80% Polaków w sondażach sprzeciwia się otwieraniu granic — i mają rację! Głos narodu jest jasny: nie chcemy imigrantów. Rząd powinien słuchać obywateli, a nie brukselskich biurokratów i korporacyjnych lobbystów.", "merit": 3, "popularity": 20, "explanation": "Argument ad populum — odwołanie do sondaży i 'woli narodu' jako rozstrzygającego argumentu w kwestii wymagającej analizy ekonomicznej i prawnej. Popularność poglądu nie świadczy o jego słuszności.", "reactions": ["Naród ma głos! Demokracja!", "Ale politykę gospodarczą robi się na danych, nie na sondażach...", "Typowe populistyczne zagrywki."], "inoculation": 7}}}, {"id": "dist_spin_1", "mode": "spin-doctor", "domain": "zdrowotna", "topic": "Komercjalizacja szpitali publicznych", "briefing": "Jesteś doradcą polityka, który chce zablokować propozycję częściowej komercjalizacji oddziałów szpitali publicznych (model: 80% usług publicznych, 20% komercyjnych, z zysków finansowanie sprzętu). Twoim zadaniem jest zniekształcić tę propozycję tak, aby brzmiała groźnie. Wykorzystaj techniki zniekształcania argumentów.", "targetFallacyCategory": "distortion", "options": [{"id": "straw_man", "technique": "Słomiana kukła (straw man)", "text": "Rząd chce sprywatyzować polską służbę zdrowia! Ich plan to oddanie szpitali w ręce korporacji, które będą leczyć tylko bogatych. Za chwilę za wizytę u lekarza zapłacicie jak za samochód, a biedni zostaną na lodzie!", "meritDamage": 1, "popularityGain": 17, "inoculationGain": 12, "expertDebunking": "Klasyczna słomiana kukła: propozycja 20% komercjalizacji z przeznaczeniem zysków na sprzęt została przekształcona w 'pełną prywatyzację' i 'oddanie szpitali korporacjom'. Zniekształcenie jest na tyle dramatyczne, że łatwo je atakować — ale nie ma nic wspólnego z rzeczywistą propozycją.", "reactions": ["Ręce precz od służby zdrowia!", "Ale to nie o pełną prywatyzację chodzi...", "Korporacje rządzą światem, teraz chcą nasze szpitale!"]}, {"id": "false_dilemma", "technique": "Fałszywa alternatywa", "text": "Mamy tylko dwie opcje: albo zachowamy w pełni publiczną służbę zdrowia, albo zgodzimy się na amerykański model, gdzie bankructwo z powodu rachunków za leczenie jest codziennością. Nie ma czegoś takiego jak 'trochę komercyjny' szpital.", "meritDamage": 5, "popularityGain": 14, "inoculationGain": 11, "expertDebunking": "Fałszywa alternatywa — w rzeczywistości większość krajów europejskich stosuje modele mieszane (Francja, Holandia, Niemcy) z różnym udziałem sektora prywatnego. Twierdzenie, że nie ma czegoś takiego jak 'trochę komercyjny' szpital, jest po prostu nieprawdziwe.", "reactions": ["Nie chcemy być jak Ameryka!", "Ale w Niemczech jakoś działa model mieszany...", "Czarno-białe myślenie, typowe."]}, {"id": "weak", "technique": "Fałszywy kompromis", "text": "Komercjalizacja szpitali to nie całkowita prywatyzacja, tylko partnerstwo publiczno-prywatne. Tym razem będzie to umiarkowane rozwiązanie, które łączy efektywność sektora prywatnego z dostępem publicznym. To złoty środek między dwiema skrajnościami.", "meritDamage": 12, "popularityGain": 10, "inoculationGain": 8, "expertDebunking": "Fałszywy kompromis sugeruje, że rozwiązanie pośrodku jest zawsze lepsze, ale nie zawsze tak jest. Bez szczegółów dotyczących struktury partnerstwa, podziału zysków i gwarancji dostępu, trudno ocenić, czy to naprawdę balans, czy przebrana prywatyzacja ukrywająca się pod pozorem kompromisu.", "reactions": ["Ale DLACZEGO ci się nie podoba?", "Zero argumentów, same opinie.", "Meh."]}]}, {"id": "dist_ctx_1", "mode": "context-judge", "domain": "mieszkaniowa", "topic": "Podatek od pustostanów", "context": "Debata miejska o wprowadzeniu podatku od mieszkań, które stoją puste ponad 12 miesięcy. Radna przedstawia swoją interpretację stanowiska właścicieli nieruchomości.", "argument": "Przeciwnicy tego podatku twierdzą, że władze miejskie nie powinny ingerować w prawo własności. Ale przecież prawo własności nie jest absolutne — kodeks cywilny przewiduje ograniczenia, a Konstytucja mówi o społecznej funkcji własności. Ich argument sprowadza się do tego, że właściciel może robić ze swoją nieruchomością absolutnie wszystko, a tak nie jest.", "isActuallySophism": true, "fallacyIfSophism": "Słomiana kukła (straw man)", "explanation": "To JEST sofizmat (słomiana kukła). Radna zniekształca stanowisko przeciwników: ich argument prawdopodobnie nie brzmi 'właściciel może robić absolutnie wszystko', lecz 'ten konkretny podatek jest nadmierną ingerencją'. Pomiędzy 'absolutną wolnością własności' a 'podatkiem od pustostanów' istnieje szerokie spektrum — radna celowo redukuje stanowisko oponentów do skrajnej wersji.", "ifCalledSophism": "Trafna analiza! Radna celowo przerysowuje stanowisko oponentów. Mają oni prawo argumentować, że konkretny podatek jest nadmierną ingerencją, bez twierdenia, że własność jest absolutna. To subtelne słomiana kukła — trudniejsze do wychwycenia, bo częściowo opiera się na prawdziwych przesłankach (społeczna funkcja własności).", "ifCalledLegitimate": "Warto spojrzeć uważniej. Choć radna ma rację co do społecznej funkcji własności (to prawda), zniekształca stanowisko oponentów — prawdopodobnie nie twierdzą oni, że własność jest absolutna, ale że TEN KONKRETNY podatek jest nadmierny. Redukowanie ich argumentu do skrajnej wersji to słomiana kukła.", "contextFactors": ["Radna przywołuje prawdziwe fakty (społeczna funkcja własności, Konstytucja) — co utrudnia rozpoznanie słomianej kukły", "Stanowisko oponentów jest przerysowane: z 'ten podatek jest nadmierny' robi 'własność jest absolutna'", "Subtelna słomiana kukła: pozornie logiczny argument, ale oparty na zniekształconej wersji stanowiska przeciwników"], "inoculationGain": 10, "kpiCorrect": {"merit": 12, "popularity": 8, "inoculation": 10}, "kpiIncorrect": {"merit": 4, "popularity": 12, "inoculation": 4}}]}, {"id": "causation", "name": "Błędy przyczynowe", "description": "Wyciąganie błędnych wniosków przyczynowych o skutkach polityki społecznej. Korelacja nie oznacza przyczynowości, a łańcuchy przyczynowe wymagają dowodów na każdym etapie.", "badgeName": "Analityk przyczyn", "color": "#22c55e", "fallacies": ["Post hoc ergo propter hoc (po tym, więc wskutek tego)", "Argument równi pochyłej (slippery slope)", "Dowód anegdotyczny"], "scenarios": [{"id": "caus_det_1", "mode": "detective", "domain": "zdrowotna", "topic": "Wpływ programu 500+ na zdrowie publiczne", "context": "Popularny bloger polityczny publikuje post na temat programu 500+, który zdobywa tysiące udostępnień.", "argument": "Od czasu wprowadzenia programu 500+ liczba przypadków otyłości u dzieci wzrosła o 12%. Obserwujemy zbieżność czasową pomiędzy uruchomieniem programu a wzrostem otyłości. Po wprowadzeniu programu zaczęliśmy notować szczególnie dynamiczny wzrost wagi u najmłodszych. To sugeruje, że program 500+ może mieć związek z epidemią otyłości wśród polskich dzieci!", "fallacy": "Post hoc ergo propter hoc", "fallacyExplanation": "Bloger zakłada, że skoro otyłość u dzieci wzrosła po wprowadzeniu 500+, to program jest jej przyczyną. To klasyczny błąd post hoc ergo propter hoc — następstwo czasowe nie dowodzi związku przyczynowego. Trend wzrostu otyłości dziecięcej występuje globalnie i w Polsce rozpoczął się na długo przed 500+. Korelacja mogłaby mieć wiele przyczyn: zmiany stylu życia, pandemia COVID-19, większy dostęp do przetworzonej żywności.", "contextSensitivity": {"level": "medium", "validWhen": "Badanie wpływu transferów pieniężnych na nawyki żywieniowe jest uzasadnione — ale wymaga kontrolowanego badania naukowego z grupą kontrolną, nie prostej korelacji czasowej. Pytanie o to, na co rodzice wydają 500+, jest zasadne, ale odpowiedź wymaga danych, nie domysłów.", "invalidBecause": "Bloger wnioskuje przyczynowość z samej korelacji czasowej, ignorując inne potencjalne przyczyny wzrostu otyłości i nie powołując się na żadne badanie, które izolowałoby wpływ programu 500+ od innych czynników."}, "responses": {"substantive": {"text": "Argument zakłada przyczynowość na podstawie jedynie korelacji czasowej. Rzeczywisty wzrost otyłości może mieć wiele przyczyn: zmiana nawyków żywieniowych, wzrost spożycia fast foodów, mniej aktywności. Czy istnieją badania pokazujące bezpośredni związek między programem a otyłością? To wymaga rzetelnego dowodu.", "merit": 16, "popularity": 4, "explanation": "Odpowiedź precyzyjnie identyfikuje błąd logiczny (korelacja ≠ przyczynowość), podaje kontekst (globalny trend) i wskazuje, jakie dowody byłyby potrzebne. Merytoryczna, ale nie atakuje autora.", "reactions": ["Korelacja nie oznacza przyczynowości — nudne, ale prawdziwe.", "A jak wytłumaczysz te 12%?", "Typowy obrońca 500+, zawsze znajdzie wymówkę."], "inoculation": 10}, "eristic": {"text": "To błędne wnioskowanie z korelacji! Jedynie fakt, że dwa zjawiska zaszły w tym samym czasie, nie oznacza, że jedno spowodowało drugie. Otyłość wzrasta z wielu powodów. Gdzie są rzeczywiste badania pokazujące powiązanie z programem 500+?", "merit": 5, "popularity": 15, "explanation": "Sarkazm trafnie wyśmiewa błąd logiczny, ale redukcja ad absurdum sama w sobie nie jest argumentem. Humorystyczna, ale nie wnosi alternatywnego wyjaśnienia.", "reactions": ["Haha, deszcz powoduje poniedziałki!", "Śmieszne, ale nie odpowiedziałeś na pytanie.", "Dobre! Tak działa ta pseudo-logika."], "inoculation": 10}, "fallacious": {"text": "Wzrost otyłości jest rzeczywiście problemem godnym uwagi, ale jego przyczyny są złożone. Zmienił się styl życia, dostęp do jedzenia, aktywność fizyczna. Zamiast szukać jednego winowajcy, powinniśmy zbadać wszystkie czynniki i ich rzeczywisty wpływ.", "merit": 2, "popularity": 21, "explanation": "Odpowiedź opiera się na dowodzie anegdotycznym — kilka znanych przypadków nie może być podstawą do oceny programu obejmującego miliony rodzin. Obserwacja 5 rodzin nie zastępuje badań na reprezentatywnej próbie.", "reactions": ["U mnie na osiedlu tak samo!", "5 rodzin z 3 milionów to nie jest dowód...", "Ale widzę to na własne oczy, nie potrzebuję statystyk!"], "inoculation": 7}}}, {"id": "caus_det_2", "mode": "detective", "domain": "mieszkaniowa", "topic": "Kontrola czynszów", "context": "Debata w radzie miasta na temat wprowadzenia regulacji ograniczającej wzrost czynszów w centrum. Radny opozycji zabiera głos.", "argument": "Jeśli dzisiaj ograniczymy czynsze, jutro właściciele przestaną remontować budynki, za rok zaczną je sprzedawać, za dwa lata nikt nie będzie budował nowych mieszkań, a za pięć lat będziemy mieli slumsy jak w Nowym Jorku lat 70.!", "fallacy": "Argument równi pochyłej", "fallacyExplanation": "Mówca przedstawia ciąg domniemanych konsekwencji jako nieuchronny, nie dostarczając dowodów na to, że każdy kolejny krok musi nastąpić. Kontrola czynszów to złożony instrument, który może być zaprojektowany na wiele sposobów. Porównanie z Nowym Jorkiem lat 70. pomija dziesiątki innych czynników tamtejszego kryzysu.", "contextSensitivity": {"level": "medium", "validWhen": "Argument o negatywnych skutkach kontroli czynszów może być uzasadniony, gdy oparty jest na konkretnych badaniach ekonomicznych i doświadczeniach miast z podobnymi regulacjami. Analiza łańcucha przyczynowego wymaga jednak dowodów na każdy krok.", "invalidBecause": "Mówca przeskakuje przez wiele etapów bez uzasadnienia, że każdy z nich nieuchronnie wynika z poprzedniego. Porównanie z Nowym Jorkiem lat 70. jest nieadekwatne — tamta sytuacja miała wiele przyczyn, nie tylko kontrolę czynszów."}, "responses": {"substantive": {"text": "Radny przedstawia łańcuch domniemanych konsekwencji bez uzasadnienia każdego ogniwa. Czy regulacja czynszów naprawdę prowadzi do zaprzestania remontów? Doświadczenia Wiednia, Berlina czy Barcelony dają zróżnicowane wyniki. Każdy krok tego scenariusza wymaga osobnego uzasadnienia danymi.", "merit": 15, "popularity": 6, "explanation": "Odpowiedź nie ignoruje obaw, ale przenosi dyskusję z hipotetycznych łańcuchów katastroficznych na dane empiryczne z miast o regulacji czynszów. Proponuje metodyczne podejście do analizy ryzyka.", "reactions": ["Nudne, ale w sumie ma rację — sprawdźmy dane.", "Wiedeń to nie Polska!", "Wreszcie ktoś mówi o faktach, a nie o strachach."], "inoculation": 9}, "eristic": {"text": "Za chwilę powie pan, że ograniczenie czynszów spowoduje trzęsienie ziemi! Każdy kolejny krok tego argumentu jest bardziej absurdalny od poprzedniego. Od regulacji czynszów do slumsów z lat 70. — ile kroków potrzeba, żeby dojść do końca świata?", "merit": 4, "popularity": 16, "explanation": "Sarkazm celnie wyśmiewa przesadę argumentu równi pochyłej, ale nie odnosi się do faktycznych ryzyk regulacji czynszów. Kontratak retoryczny zamiast merytorycznej analizy.", "reactions": ["DOKŁADNIE! Niech sam spróbuje!", "Ogień odpowiedziano ogniem!", "To było ostre, ale w punkt."], "inoculation": 10}, "fallacious": {"text": "80% mieszkańców centrum chce regulacji czynszów — to głos ludu! Właściciele i tak zarabiają krocie, a ludzie nie mają gdzie mieszkać. Kto jest przeciw regulacji, broni interesów kamieniczników, nie zwykłych ludzi.", "merit": 3, "popularity": 20, "explanation": "Argument ad populum — popularność regulacji nie dowodzi jej skuteczności. Dodatkowo atak ad personam (obrońcy kamieniczników). Ignoruje złożoność ekonomiczną problemu.", "reactions": ["Właśnie! Ludzie chcą regulacji!", "Głos ludu, głos Boga!", "Ale popularność nie oznacza, że to zadziała..."], "inoculation": 7}}}, {"id": "caus_spin_1", "mode": "spin-doctor", "domain": "ubezpieczen_spolecznych", "topic": "Wprowadzenie dochodu gwarantowanego", "briefing": "Jesteś doradcą medialnym partii opozycyjnej, która chce zdyskredytować pilotażowy program dochodu gwarantowanego (1200 zł/miesiąc dla 5000 osób w trzech miastach). Musisz stworzyć argument sugerujący katastrofalne skutki, wykorzystując techniki fałszywego przyczynowania.", "targetFallacyCategory": "causation", "options": [{"id": "slippery_slope", "technique": "Argument równi pochyłej", "text": "Dzisiaj dajemy 1200 zł za nic 5000 osób. Jutro będą chciały 2000, potem 3000. Za rok nikt nie będzie pracował, firmy zaczną upadać, państwo zbankrutuje i skończymy jak Wenezuela. To początek końca polskiej gospodarki!", "meritDamage": 2, "popularityGain": 16, "inoculationGain": 12, "expertDebunking": "Klasyczny argument równi pochyłej: z pilotażowego programu dla 5000 osób wyciągany jest wniosek o bankructwie państwa. Każdy krok w łańcuchu (eskalacja kwot → masowa rezygnacja z pracy → upadek firm → bankructwo) wymaga osobnego uzasadnienia. Badania nad dochodem gwarantowanym (Finlandia, Kenia, Stockton) nie potwierdzają masowej rezygnacji z pracy.", "reactions": ["Wenezuela! Wiedziałem, do tego prowadzi socjalizm!", "Ale to jest pilotaż dla 5000 osób, nie rewolucja...", "Straszenie działa, bo ludzie nie czytają szczegółów."]}, {"id": "post_hoc", "technique": "Post hoc ergo propter hoc", "text": "W Finlandii w 2017 roku uruchomili podobny program — i co? Bezrobocie nie spadło! Po dwóch latach program zamknięto. To dowód, że dochód gwarantowany nie działa i jest wyrzucaniem pieniędzy w błoto!", "meritDamage": 5, "popularityGain": 14, "inoculationGain": 11, "expertDebunking": "Uproszczenie wyników eksperymentu fińskiego. Program nie został 'zamknięty z powodu porażki' — miał z góry określony czas trwania. Wyniki były mieszane: brak wpływu na zatrudnienie, ale poprawa zdrowia psychicznego i poczucia bezpieczeństwa. Fałszywa przyczynowość: brak spadku bezrobocia ≠ dowód nieskuteczności, bo program nie miał na celu zwiększenia zatrudnienia.", "reactions": ["Finlandia spróbowała i nie wyszło, po co powtarzać błędy?", "Ale ten program miał inne cele niż redukcja bezrobocia...", "Brzmi przekonująco, ale coś tu nie gra."]}, {"id": "weak", "technique": "Rozumowanie słabą analogią", "text": "Dochód gwarantowany to jak zasiłek dla bezrobotnych wyjąwszy dla każdego. Zasiłki dla bezrobotnych pokazują, że dochód gwarantowany nie zachęca do pracy. Wiemy, jak się to skończy — ludzie będą pracować mniej. Historia ma nas pouczyć.", "meritDamage": 11, "popularityGain": 11, "inoculationGain": 8, "expertDebunking": "Porównanie między zasiłkami dla bezrobotnych a dochodem gwarantowanym jest słabe. To zupełnie różne systemy — dochód gwarantowany jest dla wszystkich niezależnie od zatrudnienia, podczas gdy zasiłki są dla konkretnej grupy. Badania z testów dochodów gwarantowanych w różnych krajach pokazują inne rezultaty niż zasiłki dla bezrobotnych.", "reactions": ["To za mało, żeby kogokolwiek przekonać.", "OK, ale czemu? Argumenty?", "Moralizowanie bez danych."]}]}, {"id": "caus_ctx_1", "mode": "context-judge", "domain": "edukacyjna", "topic": "Bon edukacyjny dla rodziców", "context": "Dyskusja w komisji edukacji o systemie bonów edukacyjnych, które rodzice mogliby wydać w wybranej szkole. Jeden z ekspertów prezentuje następujący argument.", "argument": "System bonów edukacyjnych w Chile, wprowadzony w 1981 roku, doprowadził do gwałtownego wzrostu segregacji społecznej w edukacji. W ciągu 20 lat różnica w wynikach nauczania między szkołami w dzielnicach bogatych i biednych wzrosła o 45%. Wprowadzenie podobnego systemu w Polsce grozi powtórzeniem tego scenariusza.", "isActuallySophism": true, "fallacyIfSophism": "Błędna analogia", "explanation": "To JEST sofizmat (błędna analogia, z elementem argumentu równi pochyłej). Porównanie z Chile pomija kluczowe różnice kontekstowe: Chile w 1981 r. to dyktatura Pinocheta z radykalnie innym systemem społecznym, politycznym i instytucjonalnym; Polska 2024 to demokracja z silną tradycją szkolnictwa publicznego i innymi mechanizmami wyrównawczymi. Kluczowa różnica z uzasadnionymi porównaniami międzynarodowymi (np. UK/Francja w kwestii integracji kulturowej): Chile lat 80. to tak odległy kontekst, że nawet hedgowana forma ('grozi powtórzeniem') jest myląca — sugeruje porównywalność, która nie istnieje. Dane o Chile mogą być relevantne jako przestroga, ale wymagają omówienia różnic i podobieństw, czego tu brakuje.", "ifCalledSophism": "Dobrze! Choć dane z Chile są prawdziwe i wartościowe, bezpośrednie przenoszenie wniosków z chilijskiego kontekstu lat 80. na współczesną Polskę to błędna analogia. Różnice systemowe, polityczne i społeczne są zbyt duże, żeby automatycznie zakładać identyczne skutki.", "ifCalledLegitimate": "Warto spojrzeć krytyczniej. Dane z Chile są prawdziwe, ale kontekst jest diametralnie inny: Chile lat 80. to dyktatura z radykalnie odmiennym systemem społecznym. Bezpośrednie wnioskowanie 'w Chile nie wyszło, więc w Polsce też nie wyjdzie' wymaga wykazania, że konteksty są porównywalne — a tu tego brakuje. To błędna analogia.", "contextFactors": ["Dane z Chile są prawdziwe, ale kontekst historyczny diametralnie różny (dyktatura vs demokracja)", "Bezpośrednie przenoszenie wniosków wymaga wykazania porównywalności systemów edukacyjnych", "Argument mógłby być uzasadniony, gdyby ekspert omówił różnice i podobieństwa między kontekstami"], "inoculationGain": 10, "kpiCorrect": {"merit": 12, "popularity": 8, "inoculation": 10}, "kpiIncorrect": {"merit": 4, "popularity": 12, "inoculation": 4}}]}, {"id": "tradition", "name": "Odwołania do tradycji i status quo", "description": "Wykorzystywanie konserwatyzmu poznawczego lub fascynacji nowością jako argumentów w debatach o polityce społecznej. Tradycja ani nowość same w sobie nie są argumentami za ani przeciw.", "badgeName": "Krytyk tradycji", "color": "#3b82f6", "fallacies": ["Argumentum ad antiquitatem (odwołanie do tradycji)", "Argumentum ad novitatem (odwołanie do nowości)", "Błędna analogia (fałszywa analogia)"], "scenarios": [{"id": "trad_det_1", "mode": "detective", "domain": "edukacyjna", "topic": "Nauczanie zdalne w szkołach", "context": "Debata na forum rodziców o propozycji wprowadzenia jednego dnia nauki zdalnej tygodniowo w szkołach ponadpodstawowych. Rodzic pisze popularny post.", "argument": "Przez setki lat dzieci chodziły do szkoły i się uczyły. Nasi dziadkowie nie potrzebowali komputerów, żeby zdobyć wykształcenie. Tradycyjna edukacja stacjonarna sprawdza się od pokoleń — nie naprawiajmy tego, co nie jest zepsute. Nowości w edukacji zawsze prowadzą do obniżenia poziomu.", "fallacy": "Argumentum ad antiquitatem (odwołanie do tradycji)", "fallacyExplanation": "Argument zakłada, że skoro tradycyjna edukacja istnieje od dawna, musi być lepsza od nowszych rozwiązań. Fakt, że coś funkcjonowało przez długi czas, nie jest sam w sobie dowodem na optymalność. Edukacja ewoluowała wielokrotnie (wprowadzenie obowiązku szkolnego, nowe przedmioty, laboratoria) i każda zmiana spotykała się z oporem.", "contextSensitivity": {"level": "medium", "validWhen": "Argumenty za wartością edukacji stacjonarnej mogą być uzasadnione, gdy opierają się na badaniach pedagogicznych o efektywności różnych form nauczania, socjalizacji uczniów, czy nierównościach w dostępie do technologii.", "invalidBecause": "Ten argument opiera się wyłącznie na tradycji ('zawsze tak było') bez odniesienia do danych o skuteczności. Generalizacja 'nowości zawsze prowadzą do obniżenia poziomu' jest fałszywa — wiele innowacji edukacyjnych poprawiło jakość nauczania."}, "responses": {"substantive": {"text": "Tradycja edukacji stacjonarnej jest cenna, ale sam fakt istnienia od pokoleń nie dowodzi optymalności. Badania pedagogiczne dają zróżnicowane wyniki: edukacja zdalna może być skuteczna w konkretnych warunkach. Pytanie nie brzmi 'nowe czy stare', lecz 'co działa najlepiej dla tych uczniów i w jakim zakresie'.", "merit": 15, "popularity": 5, "explanation": "Odpowiedź uznaje wartość tradycyjnej edukacji, ale przenosi dyskusję na grunt badań empirycznych zamiast argumentu z tradycji. Nie odrzuca edukacji stacjonarnej — prosi o dane.", "reactions": ["Badania, badania... a zdrowy rozsądek?", "Dobre podejście — dane zamiast opinii.", "Ale nasze doświadczenie też się liczy!"], "inoculation": 10}, "eristic": {"text": "Nasi dziadkowie też nie mieli kalkulatorów, a jakoś nikt nie proponuje powrotu do liczydła. 'Zawsze tak było' to nie argument — to wymówka. Może sprawdźmy badania zamiast powoływać się na przeszłość?", "merit": 5, "popularity": 15, "explanation": "Trafny kontrprzykład, który ujawnia słabość argumentu z tradycji. Ale nie odnosi się do meritum dyskusji o nauczaniu zdalnym — tylko podważa logikę oponenta.", "reactions": ["Prawo jazdy i edukacja to co innego!", "Ha, hnologii mogą być uzasadnione, gdy opierają się na analizie bezpieczeństwa, kosztów, dostępności i porównaniu z istniejącymi rozwiązaniami.", "invalidBecause": "Argument opiera się wyłącznie na fakcie nowości technologii ('nowe = lepsze') bez analizy ryzyka, kosztów, bezpieczeństwa oszczędności emerytalnych czy dostępności dla osób starszych i wykluczonych cyfrowo."}, "responses": {"substantive": {"text": "Nowość technologii blockchain i AI nie jest sama w sobie dowodem na wyższość rozwiązania. Kluczowe pytania dotyczą bezpieczeństwa: jak chronione są oszczędności emerytalne w systemie blockchain? Jaka jest dostępność dla osób starszych? Jakie są koszty wdrożenia? ZUS ma problemy, ale zastąpienie go wymaga dowodów, nie entuzjazmu.", "merit": 16, "popularity": 4, "explanation": "Odpowiedź nie odrzuca innowacji, ale wymaga merytorycznego uzasadnienia zamiast polegania na samej nowości jako argumencie. Stawia kluczowe pytania o bezpieczeństwo i dostępność.", "reactions": ["Ale nudno — zawsze jakieś ale...", "Ważne pytania. Bezpieczeństwo emerytury to nie startup.", "Konserwatysta nie rozumie technologii!"], "inoculation": 10}, "eristic": {"text": "Blockchain w emeryturach? A babcia Krysia z Pcimia będzie zarządzać portfelem kryptowalut? Rewolucja! Zaraz pewnie zaproponujecie, żeby emerytury wypłacać w NFT. Może najpierw nauczmy seniorów korzystać z internetu?", "merit": 5, "popularity": 16, "explanation": "Sarkazm trafnie punktuje oderwanie propozycji od realiów (dostępność dla osób starszych), ale nie odnosi się merytorycznie do potencjalnych zalet technologii w systemie emerytalnym.", "reactions": ["Haha, babcia z blockchaina!", "Ale to nie jest fair porównanie...", "Kpiny zamiast merytorycznej dyskusji."], "inoculation": 9}, "fallacious": {"text": "ZUS działa od dziesięcioleci i zawsze wypłacał emerytury. To sprawdzony, bezpieczny system — nie eksperymentujmy na ludziach z ich oszczędnościami życia. Tradycja publicznego systemu emerytalnego jest fundamentem bezpiecz         // Meter narratives
        const METER_NARRATIVES = {
