        // Słownik sofizmatów — terminologia zgodna z: K. Szymanek, "Sztuka argumentacji. Nowy słownik terminologiczny" (PWN, 2021)
        // Zasada: nazwa łacińska (pełna forma) + polski odpowiednik w nawiasie; gdy brak łacińskiej — nazwa polska + obcojęzyczny odpowiednik
        // Kolejność: wg kategorii gry (emocje → ataki → zniekształcanie → przyczynowość → tradycja), potem uzupełnienia
        const FALLACY_DEFINITIONS = [
            // ── KATEGORIA: Manipulacja emocjami ──
            { name: "Argumentum ad misericordiam (odwołanie do litości)",
              description: "Odwoływanie się do współczucia, litości lub cierpienia w celu skłonienia do przyjęcia tezy. Emocje mogą uzupełniać argumentację, ale nie powinny jej zastępować — sam fakt, że ktoś cierpi, nie rozstrzyga o słuszności konkretnego rozwiązania." },
            { name: "Argumentum ad metum (odwołanie do strachu)",
              description: "Wywoływanie lęku lub poczucia zagrożenia zamiast przytaczania przesłanek merytorycznych. Często łączy się z przesadzonym scenariuszem katastroficznym, który ma uniemożliwić racjonalną ocenę sytuacji." },
            { name: "Argumentum ad populum (odwołanie do ludu)",
              description: "Argument demagogiczny: uzasadnianie tezy tym, że podziela ją większość lub że jest powszechnie akceptowana. Popularność poglądu nie świadczy o jego prawdziwości ani słuszności — 'wszyscy tak myślą' nie jest dowodem." },

            // ── KATEGORIA: Ataki na osobę i autorytet ──
            { name: "Argumentum ad personam (atak personalny)",
              description: "Odmiana argumentum ad hominem polegająca na atakowaniu cech osobistych, motywacji lub sytuacji życiowej oponenta zamiast odnoszenia się do treści jego argumentów. Podważa nadawcę, nie treść komunikatu." },
            { name: "Tu quoque (ty także)",
              description: "Odmiana argumentum ad hominem polegająca na zarzuceniu oponentowi niekonsekwencji lub hipokryzji: 'sam tak robisz, więc nie masz prawa krytykować'. Nawet jeśli zarzut hipokryzji jest trafny, nie podważa to samego argumentu." },
            { name: "Argumentum ad verecundiam (nieuprawnione odwołanie do autorytetu)",
              description: "Powoływanie się na autorytet osoby, która nie jest ekspertem w danej dziedzinie, lub na autorytet bez przytoczenia konkretnych danych. Należy odróżniać od uzasadnionego argumentu z autorytetu, gdzie ekspert wypowiada się w swojej specjalności i podaje weryfikowalne dowody." },

            // ── KATEGORIA: Zniekształcanie argumentów ──
            { name: "Słomiana kukła (straw man)",
              description: "Zniekształcenie, uproszczenie lub karykaturalne przedstawienie stanowiska oponenta w celu łatwiejszego zaatakowania. Zamiast polemizować z rzeczywistym argumentem, tworzy się jego wygodniejszą do obalenia wersję." },
            { name: "Fałszywa alternatywa (fałszywy dylemat)",
              description: "Sztuczne ograniczenie wyboru do dwóch skrajnych opcji, gdy w rzeczywistości istnieje więcej możliwości. 'Albo jesteś z nami, albo przeciwko nam' — pomija całe spektrum stanowisk pośrednich." },
            { name: "Selektywne dobieranie dowodów (cherry picking)",
              description: "Wybieranie wyłącznie tych danych, przykładów lub badań, które potwierdzają z góry przyjętą tezę, przy jednoczesnym pomijaniu danych przeczących. Pozornie obiektywna prezentacja faktów, która w rzeczywistości jest jednostronna." },

            // ── KATEGORIA: Błędy przyczynowe ──
            { name: "Post hoc ergo propter hoc (po tym, więc wskutek tego)",
              description: "Błędne wnioskowanie, że skoro zdarzenie B nastąpiło po zdarzeniu A, to A musi być przyczyną B. Następstwo czasowe nie dowodzi związku przyczynowego — korelacja dwóch zjawisk wymaga osobnego uzasadnienia, że jedno rzeczywiście powoduje drugie." },
            { name: "Argument równi pochyłej (slippery slope)",
              description: "Twierdzenie, że dopuszczenie A nieuchronnie prowadzi do skrajnie negatywnego Z, bez uzasadnienia, że każde kolejne ogniwo łańcucha przyczynowego rzeczywiście musi nastąpić. Poszczególne kroki mogą być prawdopodobne, ale ich złączenie w nieuchronny ciąg wymaga dowodów." },
            { name: "Dowód anegdotyczny",
              description: "Posługiwanie się pojedynczym przypadkiem, osobistym doświadczeniem lub zasłyszaną historią jako dowodem na ogólną tezę. Indywidualne przykłady, choć sugestywne, nie zastępują danych statystycznych opartych na reprezentatywnej próbie." },

            // ── KATEGORIA: Odwołania do tradycji i nowości ──
            { name: "Argumentum ad antiquitatem (odwołanie do tradycji)",
              description: "Uzasadnianie słuszności tezy samym faktem jej długiego istnienia lub zakorzenienia w tradycji. Długotrwałość praktyki nie dowodzi jej optymalności — 'zawsze tak robiliśmy' nie jest argumentem za utrzymaniem status quo." },
            { name: "Argumentum ad novitatem (odwołanie do nowości)",
              description: "Uzasadnianie wyższości rozwiązania samym faktem, że jest nowe, nowoczesne lub innowacyjne. Nowość nie jest automatycznie lepsza od tradycji — wymaga takiego samego uzasadnienia merytorycznego jak każda inna propozycja." },
            { name: "Błędna analogia (fałszywa analogia)",
              description: "Porównanie dwóch sytuacji, które różnią się w istotnych aspektach, i wyciąganie wniosków tak, jakby były analogiczne. Analogia jest wartościowym narzędziem argumentacyjnym, ale wymaga, by podobieństwa dotyczyły cech istotnych dla wniosku." },

            // ── UZUPEŁNIENIA (ważne sofizmaty w debacie o polityce społecznej) ──
            { name: "Petitio principii (błędne koło, dowodzenie z założenia)",
              description: "Błąd rozumowania, w którym wniosek jest już — jawnie lub niejawnie — zawarty w przesłankach. Zamiast dowodzić tezy, zakłada się z góry to, co ma być dopiero udowodnione. Często trudny do wykrycia, gdy przesłanka jest przeformułowaną wersją wniosku." },
            { name: "Czerwony śledzik (red herring)",
              description: "Celowe wprowadzenie wątku pobocznego, aby odwrócić uwagę od właściwego tematu dyskusji. Zmiana tematu może być subtelna i sprawiać wrażenie powiązania z omawianą kwestią, ale w istocie prowadzi rozmowę na boczny tor." },
            { name: "Argumentum ad baculum (odwołanie do siły)",
              description: "Posłużenie się groźbą, zastraszeniem lub przymusem zamiast argumentami merytorycznymi w celu wymuszenia zgody. Obejmuje zarówno groźby bezpośrednie, jak i sugestie negatywnych konsekwencji za niezgadzanie się z nadawcą." }
        ];

        // Main game app
        const app = {
            state: 'loading',
            data: null,
            currentCategory: 0,
            currentScenario: 0,
            meters: { merit: 0, popularity: 0, inoculation: 0 },
            badges: {},
            sessionHistory: [],
            selectedOption: null,
            selectedResponse: null,

            init() {
                this.data = SCENARIOS_DATA;
                this.categories = this.data.categories;
                this.initBadges();
                this.setupEventListeners();
                this.showNarrativeIntro();
            },

            initBadges() {
                this.badges = {};
                this.categories.forEach(cat => {
                    this.badges[cat.id] = null;
                });
            },

            setupEventListeners() {
                document.querySelector('.close-modal').addEventListener('click', () => {
                    this.closeModal();
                });
                document.getElementById('help-modal').addEventListener('click', (e) => {
                    if (e.target.id === 'help-modal') this.closeModal();
                });
            },

            showNarrativeIntro() {
                this.state = 'narrative-intro';
                const content = document.getElementById('app-content');
                content.innerHTML = `
                    <div class="narrator-card">
                        <div class="narrator-header">
                            <div class="narrator-avatar">EK</div>
                            <div class="narrator-name">Dr Ewelina Kość</div>
                        </div>
                        <p>Dzisiaj Twój pierwszy dzień w Centrum Racjonalnej Debaty. Dr Kość wygląda na zmęczoną.</p>
                        <p>„Mamy problem — ludzie już nie wierzą, że czyjeś argumenty są oparte na faktach. Wszyscy uważają, że każdy mówi nieprawdę dla własnej korzyści. To tworzy głęboką nieufność do debaty publicznej.</p>
                        <p>Ale jest też szansa. Jeśli nauczymy ludzi rozpoznawać mechanizmy manipulacji, mogą się przed nią bronić. Chcę, żebyś przeanalizował pięć głównych kategorii sofizmatów w polityce społecznej. Poznaj je — zarówno od strony tego, kto próbuje manipulować, jak i tego, kto chce się przed manipulacją bronić."</p>
                        <p>Zawiesza głos.</p>
                        <p>„To nie będzie teoretyczne ćwiczenie. Im bardziej wprawisz się w sztukę manipulacji, tym bardziej zrozumiesz jej potęgę. Ufam, że pamiętasz — wiedza o tym, jak działają sofizmaty, to nie pozwolenie na ich używanie. To odpowiedzialność."</p>
                        <p>Celem gry nie jest nauczenie cię być lepszym manipulatorem. Celem jest nauczenie cię rozpoznawać manipulację — zarówno u innych, jak i u siebie.</p>
                    </div>
                    <div class="buttons">
                        <button class="btn-primary" onclick="app.startGame()">Zaczynam analizę</button>
                        <button class="btn-secondary" onclick="app.showFallacies()">Słownik Sofizmatów</button>
                    </div>
                `;
            },

            startGame() {
                this.currentCategory = 0;
                this.currentScenario = 0;
                this.showCategoryIntro();
            },

            showCategoryIntro() {
                this.state = 'category-intro';
                const category = this.categories[this.currentCategory];
                const narrative = CHAPTER_NARRATIVES[category.id];

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    <div class="narrator-card">
                        <div class="narrator-header">
                            <div class="narrator-avatar">EK</div>
                            <div class="narrator-name">Dr Ewelina Kość</div>
                        </div>
                        <p>${narrative.openingBriefing.split('\n\n').join('</p><p>')}</p>
                    </div>
                    <div class="buttons">
                        <button class="btn-primary" onclick="app.startCategory()">Przystąpić do scenariuszy</button>
                        <button class="btn-secondary" onclick="app.showFallacies()">Słownik Sofizmatów</button>
                    </div>
                `;
            },

            startCategory() {
                this.currentScenario = 0;
                this.showScenarioBriefing();
            },

            showScenarioBriefing() {
                this.state = 'scenario-briefing';
                const category = this.categories[this.currentCategory];
                const scenario = category.scenarios[this.currentScenario];

                let briefingText = "";
                if (scenario.mode === 'detective') {
                    briefingText = "Monitorujemy tę debatę. Przeczytaj poniższy argument i zidentyfikuj sofizmat. Potem zaproponuj odpowiedź — merytoryczną, erystyczną, lub... sofizmatyczną. Wybór należy do ciebie.";
                } else if (scenario.mode === 'spin-doctor') {
                    briefingText = "Teraz się zamieniamy. Wcielasz się w doradcę komunikacyjnego. Nie osądzamy intencji — obserwujemy mechanikę. Jak się pisze przekaz, który konwertuje ludzi na stronę kontrowersyjnej decyzji? Wybierz taktykę i obserwuj skutki.";
                } else if (scenario.mode === 'context-judge') {
                    briefingText = "Nie każde odwołanie do emocji to sofizmat. Nie każde odwołanie do tradycji to ślepota. Przeanalizuj poniższy argument. Czy jest on sofizmatem, czy uzasadnionym argumentem w tym kontekście? To będzie najtrudniej — ale to też będzie najważniejsze.";
                }

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="narrator-card">
                        <div class="narrator-header">
                            <div class="narrator-avatar">EK</div>
                            <div class="narrator-name">Dr Ewelina Kość</div>
                        </div>
                        <p>${briefingText}</p>
                    </div>
                    <div class="card">
                        <h3>Kontekst:</h3>
                        <p>${scenario.context || scenario.briefing || ''}</p>
                        <h3>Temat:</h3>
                        <p><strong>${scenario.topic}</strong></p>
                        <h3>Dziedzina:</h3>
                        <p>${scenario.domain}</p>
                    </div>
                    <div class="buttons">
                        <button class="btn-primary" onclick="app.showScenario()">Przejdź do scenariusza</button>
                    </div>
                `;
            },

            showScenario() {
                const category = this.categories[this.currentCategory];
                const scenario = category.scenarios[this.currentScenario];

                if (scenario.mode === 'detective') {
                    this.showDetectiveScenario();
                } else if (scenario.mode === 'spin-doctor') {
                    this.showSpinDoctorScenario();
                } else if (scenario.mode === 'context-judge') {
                    this.showContextJudgeScenario();
                }
            },

            showDetectiveScenario() {
                this.state = 'detective-identify';
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];

                // Generate and CACHE options only once per scenario
                if (!this._cachedDetectiveOptions || this._cachedDetectiveScenarioId !== scenario.id) {
                    const allFallacies = this.getAllFallacies();
                    const correctFallacy = scenario.fallacy;
                    let opts = [correctFallacy];
                    const distractors = allFallacies.filter(f => f !== correctFallacy).sort(() => Math.random() - 0.5).slice(0, 2);
                    opts = [...opts, ...distractors].sort(() => Math.random() - 0.5);
                    this._cachedDetectiveOptions = opts;
                    this._cachedDetectiveScenarioId = scenario.id;
                }
                const options = this._cachedDetectiveOptions;
                const correctFallacy = scenario.fallacy;

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Identyfikacja Sofizmatu</h2>
                        <h3>Argument:</h3>
                        <div class="context-box">
                            <p>"${scenario.argument}"</p>
                        </div>
                        <h3>Jaki to sofizmat?</h3>
                        <div class="options">
                            ${options.map((opt, i) => `
                                <div class="option ${this.selectedOption === i ? 'selected' : ''}" onclick="app.selectOption(${i})">
                                    <div class="option-label">${String.fromCharCode(65 + i)}. ${opt}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.submitFallacyChoice()" ${this.selectedOption === null ? 'disabled' : ''}>Potwierdź</button>
                        </div>
                    </div>
                `;
            },

            showSpinDoctorScenario() {
                this.state = 'spin-doctor-briefing';
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Spin Doctor - Wybór Taktyki</h2>
                        <h3>Decyzja do „sprzedania":</h3>
                        <div class="context-box">
                            <p><strong>${scenario.topic}</strong></p>
                            <p>${scenario.briefing}</p>
                        </div>
                        <h3>Wybierz taktykę komunikacyjną:</h3>
                        <div class="options">
                            ${scenario.options.map((option, i) => `
                                <div class="option ${this.selectedOption === i ? 'selected' : ''}" onclick="app.selectOption(${i})">
                                    <div class="option-label">${String.fromCharCode(65 + i)}. ${option.technique}</div>
                                    <div class="option-text">${option.text}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.submitSpinDoctorChoice()" ${this.selectedOption === null ? 'disabled' : ''}>Wybierz</button>
                        </div>
                    </div>
                `;
            },

            showContextJudgeScenario() {
                this.state = 'context-judge-present';
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];

                const content = document.getElementById('app-content');
                const contextFactorsHtml = scenario.contextFactors && scenario.contextFactors.length > 0
                    ? `<h3>Czynniki kontekstowe:</h3><ul>${scenario.contextFactors.map(f => `<li>${f}</li>`).join('')}</ul>`
                    : '';

                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Sędzia Kontekstu - Osąd</h2>
                        <h3>Argument:</h3>
                        <div class="context-box">
                            <p>"${scenario.argument}"</p>
                        </div>
                        ${contextFactorsHtml}
                        <h3>Czy to sofizmat, czy uzasadniony argument?</h3>
                        <div class="options">
                            <div class="option ${this.selectedOption === 0 ? 'selected' : ''}" onclick="app.selectOption(0)">
                                <div class="option-label">A. To sofizmat</div>
                            </div>
                            <div class="option ${this.selectedOption === 1 ? 'selected' : ''}" onclick="app.selectOption(1)">
                                <div class="option-label">B. To uzasadniony argument</div>
                            </div>
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.submitContextJudgeChoice()" ${this.selectedOption === null ? 'disabled' : ''}>Wyślij osąd</button>
                        </div>
                    </div>
                `;
            },

            selectOption(index) {
                this.selectedOption = index;
                // Update selection highlights directly (no re-render to avoid reshuffling)
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', i === index);
                });
                // Enable the submit button
                const submitBtn = document.querySelector('.btn-primary');
                if (submitBtn) submitBtn.disabled = false;
            },

            submitFallacyChoice() {
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];
                const correctFallacy = scenario.fallacy;
                const options = this._cachedDetectiveOptions;
                const selectedFallacy = options[this.selectedOption];
                const isCorrect = selectedFallacy === correctFallacy;

                this.state = 'detective-feedback';
                this.selectedOption = null;

                // Log and update meters
                if (isCorrect) {
                    this.meters.inoculation += 5;
                    this.meters.merit += 3;
                } else {
                    this.meters.inoculation += 2;
                }

                this.sessionHistory.push({
                    type: 'detective',
                    scenario: scenario.id,
                    correct: isCorrect,
                    selected: selectedFallacy,
                    correct_answer: correctFallacy
                });

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>${isCorrect ? 'Poprawnie!' : 'Niepoprawnie'}</h2>
                        <p>${isCorrect ? 'Zidentyfikowałeś sofizmat.' : `Wybrałeś "${selectedFallacy}", ale to jest "${correctFallacy}".`}</p>
                        <div class="context-box">
                            <p><strong>Wyjaśnienie:</strong> ${scenario.fallacyExplanation}</p>
                        </div>
                        <h3>Jak na to odpowiedzieć?</h3>
                        <p>Teraz zaproponuj odpowiedź na ten argument.</p>
                        <div class="options">
                            ${Object.entries(scenario.responses).map(([key, resp], i) => {
                                const typeLabels = { substantive: 'Merytoryczna', eristic: 'Erystyczna', fallacious: 'Sofizmatyczna' };
                                return `
                                    <div class="option ${this.selectedResponse === i ? 'selected' : ''}" onclick="app.selectResponse(${i})">
                                        <div class="option-label">${String.fromCharCode(65 + i)}. ${typeLabels[key] || key}</div>
                                        <div class="option-text">${resp.text}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.submitDetectiveResponse()" ${this.selectedResponse === null ? 'disabled' : ''}>Wyślij odpowiedź</button>
                        </div>
                    </div>
                `;
            },

            selectResponse(index) {
                this.selectedResponse = index;
                // Update selection highlights directly
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', i === index);
                });
                // Enable the submit button
                const submitBtn = document.querySelector('.btn-primary');
                if (submitBtn) submitBtn.disabled = false;
            },

            submitDetectiveResponse() {
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];
                const responseEntries = Object.entries(scenario.responses);
                const [responseKey, response] = responseEntries[this.selectedResponse];

                this.state = 'detective-result';
                this.selectedResponse = null;

                // Apply score changes (all three KPIs, always sum to 30)
                this.meters.merit += response.merit;
                this.meters.popularity += response.popularity;
                this.meters.inoculation += (response.inoculation || 0);

                const typeLabels = { substantive: 'Merytoryczna', eristic: 'Erystyczna', fallacious: 'Sofizmatyczna' };
                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Efekt Twojej Odpowiedzi</h2>
                        <p><strong>Wybrałeś: ${typeLabels[responseKey] || responseKey}</strong></p>
                        <p>${response.explanation}</p>
                        <h3>Skutki:</h3>
                        <div class="stats">
                            ${response.merit ? `<div class="stat"><div class="stat-value">+${response.merit}</div><div class="stat-label">Rzetelność</div></div>` : ''}
                            ${response.popularity ? `<div class="stat"><div class="stat-value">+${response.popularity}</div><div class="stat-label">Popularność</div></div>` : ''}
                            ${response.inoculation ? `<div class="stat"><div class="stat-value">+${response.inoculation}</div><div class="stat-label">Odporność</div></div>` : ''}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.nextScenario()">Następny scenariusz</button>
                        </div>
                    </div>
                `;
            },

            submitSpinDoctorChoice() {
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];
                const option = scenario.options[this.selectedOption];

                this.state = 'spin-doctor-result';
                this.selectedOption = null;

                // All three KPIs sum to 30 per choice
                this.meters.merit += option.meritDamage;
                this.meters.popularity += option.popularityGain;
                this.meters.inoculation += option.inoculationGain;

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Skuteczność Taktyki</h2>
                        <p><strong>Użyta taktyka: ${option.technique}</strong></p>
                        <p>${option.expertDebunking}</p>
                        <h3>Skutki:</h3>
                        <div class="stats">
                            ${option.meritDamage ? `<div class="stat"><div class="stat-value">+${option.meritDamage}</div><div class="stat-label">Rzetelność</div></div>` : ''}
                            ${option.popularityGain ? `<div class="stat"><div class="stat-value">+${option.popularityGain}</div><div class="stat-label">Popularność</div></div>` : ''}
                            ${option.inoculationGain ? `<div class="stat"><div class="stat-value">+${option.inoculationGain}</div><div class="stat-label">Odporność</div></div>` : ''}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.nextScenario()">Następny scenariusz</button>
                        </div>
                    </div>
                `;
            },

            submitContextJudgeChoice() {
                const scenario = this.categories[this.currentCategory].scenarios[this.currentScenario];
                const playerChosenSophism = this.selectedOption === 0;
                const actuallyIsSophism = scenario.isActuallySophism;
                const isCorrect = playerChosenSophism === actuallyIsSophism;

                this.state = 'context-judge-result';
                this.selectedOption = null;

                // Apply KPI based on correctness (correct=30pts, incorrect=20pts)
                const kpi = isCorrect
                    ? (scenario.kpiCorrect || {merit: 12, popularity: 8, inoculation: 10})
                    : (scenario.kpiIncorrect || {merit: 4, popularity: 12, inoculation: 4});
                this.meters.merit += kpi.merit;
                this.meters.popularity += kpi.popularity;
                this.meters.inoculation += kpi.inoculation;

                const verdict = playerChosenSophism ? 'To sofizmat' : 'To uzasadniony argument';
                const feedback = isCorrect
                    ? (playerChosenSophism ? scenario.ifCalledSophism : scenario.ifCalledLegitimate)
                    : (playerChosenSophism ? scenario.ifCalledLegitimate : scenario.ifCalledSophism);

                const contextFactorsHtml = scenario.contextFactors && scenario.contextFactors.length > 0
                    ? `<h3>Czynniki kontekstowe:</h3><ul>${scenario.contextFactors.map(f => `<li>${f}</li>`).join('')}</ul>`
                    : '';

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>${isCorrect ? 'Poprawnie!' : 'Niepoprawnie'}</h2>
                        <p><strong>Twój osąd: ${verdict}</strong></p>
                        <p>${feedback}</p>
                        <h3>Wyjaśnienie:</h3>
                        <div class="context-box">
                            <p>${scenario.explanation}</p>
                        </div>
                        ${contextFactorsHtml}
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.nextScenario()">Następny scenariusz</button>
                        </div>
                    </div>
                `;
            },

            nextScenario() {
                this.currentScenario++;
                const category = this.categories[this.currentCategory];

                if (this.currentScenario < category.scenarios.length) {
                    this.showScenarioBriefing();
                } else {
                    this.showCategoryCompletion();
                }
            },

            showCategoryCompletion() {
                this.state = 'next-in-category';
                const category = this.categories[this.currentCategory];
                const narrative = CHAPTER_NARRATIVES[category.id];

                // Calculate badge (use normalized scores)
                const avgScore = (this.normalizeScore(this.meters.merit) + this.normalizeScore(this.meters.inoculation)) / 2;
                let badge = null;
                if (avgScore >= 80) badge = 'gold';
                else if (avgScore >= 65) badge = 'silver';
                else badge = 'bronze';

                this.badges[category.id] = badge;

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Kategoria ukończona: ${category.name}</h2>
                        <h3>Twoja odznaka:</h3>
                        <div class="badges">
                            <span class="badge ${badge}">🏆 ${badge.toUpperCase()}</span>
                        </div>
                        <p>${narrative.closingMessages[badge]}</p>
                        ${narrative.transitionMessage ? `<p><em>${narrative.transitionMessage}</em></p>` : ''}
                    </div>
                    <div class="buttons">
                        <button class="btn-primary" onclick="app.nextCategory()">Następna kategoria</button>
                    </div>
                `;
            },

            nextCategory() {
                this.currentCategory++;
                if (this.currentCategory < this.categories.length) {
                    this.showCategoryIntro();
                } else {
                    this.showEndGame();
                }
            },

            showEndGame() {
                this.state = 'end-game-profile';

                const profile = this.getPlayerProfile();
                const reflection = this.getEndGameReflection();

                const content = document.getElementById('app-content');
                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="profile-card">
                        <div class="profile-icon">${profile.icon}</div>
                        <h2>${profile.name}</h2>
                        <p><strong>${profile.description}</strong></p>
                        <p>${profile.debateImplication}</p>
                    </div>
                    <div class="narrator-card">
                        <div class="narrator-header">
                            <div class="narrator-avatar">EK</div>
                            <div class="narrator-name">Dr Ewelina Kość</div>
                        </div>
                        <p><strong>${reflection}</strong></p>
                        <p>Przeszedłeś przez pięć kategorii. Teraz wiesz, jak działa manipulacja — od emocji, przez ataki, zniekształcenia, błędy przyczynowe, aż do tradycji.</p>
                        <p>Ale wiesz też coś innego. Że każdy z tych \"sofizmatów\" czasami ma potencjał bycia argumentem uzasadnionym. Emocje mogą być ważne — jeśli są poparte danymi. Autorytet może być istotny — jeśli jest rzeczywiście ekspertem. Tradycja może być mądrością — jeśli została przetestowana.</p>
                        <p>To co ostatecznie decyduje: kontekst. Dane. Uczciwość. Chęć zrozumienia oponenta, zamiast tylko jego pokonania.</p>
                        <p>To są narzędzia. To, co z nimi zrobisz, to Twoja odpowiedzialność.</p>
                    </div>
                    <div class="buttons">
                        <button class="btn-primary" onclick="app.showSessionStats()">Podsumowanie sesji</button>
                        <button class="btn-secondary" onclick="app.showNarrativeIntro()">Nowa gra</button>
                    </div>
                `;
            },

            showSessionStats() {
                const content = document.getElementById('app-content');
                const detectives = this.sessionHistory.filter(h => h.type === 'detective').length;
                const correctDetectives = this.sessionHistory.filter(h => h.type === 'detective' && h.correct).length;

                content.innerHTML = `
                    ${this.renderMeters()}
                    <div class="card">
                        <h2>Podsumowanie Sesji</h2>
                        <h3>Statystyki:</h3>
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-value">${detectives}</div>
                                <div class="stat-label">Scenariusze</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${correctDetectives}/${detectives}</div>
                                <div class="stat-label">Poprawne</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${Math.round(correctDetectives/detectives*100)}%</div>
                                <div class="stat-label">Trafność</div>
                            </div>
                        </div>
                        <h3>Zdobyte odznaki:</h3>
                        <div class="badges">
                            ${Object.entries(this.badges).map(([catId, badge]) => {
                                if (!badge) return '';
                                const cat = this.categories.find(c => c.id === catId);
                                return `<span class="badge ${badge}">🏆 ${cat.name}</span>`;
                            }).join('')}
                        </div>
                        <div class="buttons">
                            <button class="btn-primary" onclick="app.showNarrativeIntro()">Nowa gra</button>
                        </div>
                    </div>
                `;
            },

            getPlayerProfile() {
                const m = this.normalizeScore(this.meters.merit);
                const p = this.normalizeScore(this.meters.popularity);
                const i = this.normalizeScore(this.meters.inoculation);

                for (const profile of PLAYER_PROFILES) {
                    if (profile.condition(m, p, i)) {
                        return profile;
                    }
                }
                return PLAYER_PROFILES[PLAYER_PROFILES.length - 1];
            },

            getEndGameReflection() {
                const m = this.normalizeScore(this.meters.merit);
                const p = this.normalizeScore(this.meters.popularity);
                const i = this.normalizeScore(this.meters.inoculation);

                if (m >= 75 && i >= 75) {
                    return "Wiesz, jak działa manipulacja — i wiesz, jak jej nie używać. Twoje analizy będą budować fundamenty racjonalnej debaty. To długi proces, ale czymś trzeba zacząć. Gratulacje.";
                }
                if (m >= 60 && p < 80) {
                    return "Wybrałeś trudną drogę. Niewielu podąża za tobą. Ale twoja analiza jest rzetelna. To ma wartość — czasami długotrwałą, nawet jeśli niewidoczną teraz.";
                }
                if (m <= 42 && p >= 90) {
                    return "Rozumiesz, jak zdobywać uwagę i wpływ. Ale zastanów się: czy to taki sukces, gdy zdobywasz go kosztem prawdy? Wciąż masz czas, żeby zmienić podejście.";
                }
                if (m >= 45 && i >= 70) {
                    return "Moi najlepsi analitycy to ci, którzy rozumieją manipulację od wewnątrz. Teraz zmień perspektywę: jak tę wiedzę wykorzystać, żeby ludzi bronić, zamiast ich oszukiwać?";
                }
                if (m >= 45) {
                    return "Znalazłeś równowagę — przynajmniej na razie. To trudne. Będzie wymagać ciągłej adaptacji bez utraty rdzenia.";
                }
                return "To było pierwsze przybliżenie. Analiza sofizmatów to umiejętność, którą się rozwija. Wróć do wybranej kategorii — próbuj innego podejścia. Nie ma ideału — jest tylko pragmatyzm połączony z etyką.";
            },

            // Normalize raw meter value to 0-100 scale
            normalizeScore(raw) {
                return Math.min(100, Math.round(raw / 3));
            },

            renderMeters() {
                const nm = this.normalizeScore(this.meters.merit);
                const np = this.normalizeScore(this.meters.popularity);
                const ni = this.normalizeScore(this.meters.inoculation);
                return `
                    <div class="meters">
                        <div class="meter merit">
                            <div class="meter-label">Rzetelność</div>
                            <div class="meter-bar">
                                <div class="meter-fill" style="width: ${nm}%"></div>
                            </div>
                            <div class="meter-value">${nm}</div>
                        </div>
                        <div class="meter popularity">
                            <div class="meter-label">Popularność</div>
                            <div class="meter-bar">
                                <div class="meter-fill" style="width: ${np}%"></div>
                            </div>
                            <div class="meter-value">${np}</div>
                        </div>
                        <div class="meter inoculation">
                            <div class="meter-label">Odporność</div>
                            <div class="meter-bar">
                                <div class="meter-fill" style="width: ${ni}%"></div>
                            </div>
                            <div class="meter-value">${ni}</div>
                        </div>
                    </div>
                `;
            },

            showFallacies() {
                const modal = document.getElementById('help-modal');
                const list = document.getElementById('fallacies-list');

                list.innerHTML = FALLACY_DEFINITIONS.map(fallacy => `
                    <div class="fallacy-item">
                        <div class="fallacy-name">${fallacy.name}</div>
                        <div class="fallacy-description">${fallacy.description}</div>
                    </div>
                `).join('');

                modal.classList.add('active');
            },

            closeModal() {
                document.getElementById('help-modal').classList.remove('active');
            },

            getAllFallacies() {
                const fallacies = new Set();
                this.categories.forEach(cat => {
                    cat.fallacies.forEach(f => fallacies.add(f));
                });
                return Array.from(fallacies);
            },

            // getDetectiveOptions removed — options are now cached in showDetectiveScenario

            // render() removed — selectOption/selectResponse update DOM directly to avoid re-shuffle bugs
        };

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
